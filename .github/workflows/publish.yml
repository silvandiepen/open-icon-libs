name: Publish Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-open-icon-libs
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Refresh tags
        run: git fetch --force --tags origin

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          current="$(node -p "require('./packages/open-icon-transform/package.json').version")"
          IFS='.' read -r major minor patch <<< "$current"
          next="$major.$minor.$((patch + 1))"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Calculate next open-icon version
        id: open_icon_version
        shell: bash
        run: |
          current="$(node -p "require('./packages/open-icon/package.json').version")"
          published="$(npm view open-icon version 2>/dev/null || true)"
          next="$(node -e "const current = process.argv[1]; const published = process.argv[2]; const parse = (value) => value.split('.').map((segment) => Number.parseInt(segment, 10) || 0); const compare = (left, right) => { const leftParts = parse(left); const rightParts = parse(right); for (let index = 0; index < Math.max(leftParts.length, rightParts.length); index += 1) { const difference = (leftParts[index] ?? 0) - (rightParts[index] ?? 0); if (difference !== 0) { return difference; } } return 0; }; const base = published && compare(published, current) > 0 ? published : current; const [major, minor, patch] = parse(base); process.stdout.write([major, minor, patch + 1].join('.'));" "$current" "$published")"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Calculate release notes range
        id: release_notes
        shell: bash
        run: |
          previous_release_commit="$(git log --grep='^chore(Release): publish v' --format=%H -n 1 --first-parent HEAD || true)"

          if [ -n "$previous_release_commit" ]; then
            range="${previous_release_commit}..HEAD"
          else
            range="HEAD"
          fi

          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Bump package versions
        run: |
          npm pkg set "version=${{ steps.open_icon_version.outputs.next }}" --workspace open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace open-icon-transform
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace open-icon-svg
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace vite-plugin-open-icon
          npm pkg set "dependencies.open-icon-svg=${{ steps.version.outputs.next }}" --workspace open-icon
          npm pkg set "dependencies.open-icon-transform=${{ steps.version.outputs.next }}" --workspace vite-plugin-open-icon
          npm install --package-lock-only --ignore-scripts

      - name: Build and test
        run: |
          npm run build
          npm run test

      - name: Generate docs release notes
        run: |
          node ./scripts/release-notes.mjs \
            --version "${{ steps.version.outputs.next }}" \
            --date "$(date -u +%F)" \
            --range "${{ steps.release_notes.outputs.range }}"

      - name: Publish open-icon
        run: |
          if npm view "open-icon@${{ steps.open_icon_version.outputs.next }}" version > /dev/null 2>&1; then
            echo "open-icon@${{ steps.open_icon_version.outputs.next }} already exists. Skipping publish."
          else
            npm --workspace open-icon publish --access public --provenance
          fi

      - name: Publish open-icon-transform
        run: |
          if npm view "open-icon-transform@${{ steps.version.outputs.next }}" version > /dev/null 2>&1; then
            echo "open-icon-transform@${{ steps.version.outputs.next }} already exists. Skipping publish."
          else
            npm --workspace open-icon-transform publish --access public --provenance
          fi

      - name: Publish open-icon-svg
        run: |
          if npm view "open-icon-svg@${{ steps.version.outputs.next }}" version > /dev/null 2>&1; then
            echo "open-icon-svg@${{ steps.version.outputs.next }} already exists. Skipping publish."
          else
            npm --workspace open-icon-svg publish --access public --provenance
          fi

      - name: Publish vite-plugin-open-icon
        run: |
          if npm view "vite-plugin-open-icon@${{ steps.version.outputs.next }}" version > /dev/null 2>&1; then
            echo "vite-plugin-open-icon@${{ steps.version.outputs.next }} already exists. Skipping publish."
          else
            npm --workspace vite-plugin-open-icon publish --access public --provenance
          fi

      - name: Commit version updates
        run: |
          git add package-lock.json packages/open-icon/package.json packages/open-icon-transform/package.json packages/open-icon-svg/package.json packages/vite-plugin-open-icon/package.json apps/open-icon-org/release-notes
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "chore(Release): publish v${{ steps.version.outputs.next }} [skip ci]"
          git push origin HEAD:master
