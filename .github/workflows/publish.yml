name: Publish Packages

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build, test, and verify the publish plan without releasing packages
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-open-icon-libs
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message || '', '[skip ci]') }}
    runs-on: ubuntu-latest
    environment: github-actions
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
      SHARED_VERSION_WORKSPACES: vue-open-icon react-open-icon wc-open-icon ng-open-icon open-icon-transform open-icon-svg vite-plugin-open-icon

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Refresh tags
        run: git fetch --force --tags origin

      - name: Install dependencies
        run: npm ci

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@^11.5.1
          node --version
          npm --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Report release mode
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running publish workflow in dry-run mode."
          else
            echo "Running publish workflow in release mode."
          fi

      - name: Calculate next version
        id: version
        shell: bash
        run: |
          current="$(node -p "require('./packages/open-icon-transform/package.json').version")"
          IFS='.' read -r major minor patch <<< "$current"
          next="$major.$minor.$((patch + 1))"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Calculate next open-icon version
        id: open_icon_version
        shell: bash
        run: |
          current="$(node -p "require('./packages/open-icon/package.json').version")"
          published="$(npm view open-icon version 2>/dev/null || true)"
          next="$(node -e "const current = process.argv[1]; const published = process.argv[2]; const parse = (value) => value.split('.').map((segment) => Number.parseInt(segment, 10) || 0); const compare = (left, right) => { const leftParts = parse(left); const rightParts = parse(right); for (let index = 0; index < Math.max(leftParts.length, rightParts.length); index += 1) { const difference = (leftParts[index] ?? 0) - (rightParts[index] ?? 0); if (difference !== 0) { return difference; } } return 0; }; const base = published && compare(published, current) > 0 ? published : current; const [major, minor, patch] = parse(base); process.stdout.write([major, minor, patch + 1].join('.'));" "$current" "$published")"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "published=$published" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Calculate release notes range
        id: release_notes
        shell: bash
        run: |
          previous_release_commit="$(git log --grep='^chore(Release): publish v' --format=%H -n 1 --first-parent HEAD || true)"

          if [ -n "$previous_release_commit" ]; then
            range="${previous_release_commit}..HEAD"
          else
            range="HEAD"
          fi

          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Summarize dry-run release plan
        if: env.DRY_RUN == 'true'
        env:
          OPEN_ICON_VERSION: ${{ steps.open_icon_version.outputs.next }}
          SHARED_VERSION: ${{ steps.version.outputs.next }}
        run: |
          {
            echo "# Publish Dry Run"
            echo
            echo "The workflow will build, test, and pack these package versions without publishing them:"
            echo
            echo "| Package | Version |"
            echo "| --- | --- |"
            echo "| open-icon | $OPEN_ICON_VERSION |"
            for workspace in $SHARED_VERSION_WORKSPACES; do
              echo "| $workspace | $SHARED_VERSION |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Bump package versions
        run: |
          npm pkg set "version=${{ steps.open_icon_version.outputs.next }}" --workspace open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace vue-open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace react-open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace wc-open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace ng-open-icon
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace open-icon-transform
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace open-icon-svg
          npm pkg set "version=${{ steps.version.outputs.next }}" --workspace vite-plugin-open-icon
          npm pkg set "dependencies.open-icon=${{ steps.open_icon_version.outputs.next }}" --workspace vue-open-icon
          npm pkg set "dependencies.open-icon=${{ steps.open_icon_version.outputs.next }}" --workspace react-open-icon
          npm pkg set "dependencies.open-icon=${{ steps.open_icon_version.outputs.next }}" --workspace wc-open-icon
          npm pkg set "dependencies.open-icon=${{ steps.open_icon_version.outputs.next }}" --workspace ng-open-icon
          npm pkg set "dependencies.open-icon-svg=${{ steps.version.outputs.next }}" --workspace open-icon
          npm pkg set "dependencies.open-icon-transform=${{ steps.version.outputs.next }}" --workspace vite-plugin-open-icon
          npm install --package-lock-only --ignore-scripts

      - name: Build and test
        run: |
          npm run build
          npm run test

      - name: Generate docs release notes
        run: |
          node ./scripts/release-notes.mjs \
            --version "${{ steps.version.outputs.next }}" \
            --date "$(date -u +%F)" \
            --range "${{ steps.release_notes.outputs.range }}"

      - name: Publish packages
        if: env.DRY_RUN != 'true'
        shell: bash
        env:
          OPEN_ICON_VERSION: ${{ steps.open_icon_version.outputs.next }}
          SHARED_VERSION: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail

          publish_package() {
            local workspace="$1"
            local version="$2"
            local package_spec="${workspace}@${version}"

            if npm view "$package_spec" version > /dev/null 2>&1; then
              echo "$package_spec already exists. Skipping publish."
              return 0
            fi

            npm --workspace "$workspace" publish --access public --provenance
          }

          publish_package open-icon "$OPEN_ICON_VERSION"

          for workspace in $SHARED_VERSION_WORKSPACES; do
            publish_package "$workspace" "$SHARED_VERSION"
          done

      - name: Verify dry-run publish plan
        if: env.DRY_RUN == 'true'
        shell: bash
        env:
          OPEN_ICON_VERSION: ${{ steps.open_icon_version.outputs.next }}
          SHARED_VERSION: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail

          dry_run_pack() {
            local workspace="$1"
            local version="$2"

            echo "Checking ${workspace}@${version} with npm pack --dry-run"
            npm pack --dry-run --workspace "$workspace"
          }

          dry_run_pack open-icon "$OPEN_ICON_VERSION"

          for workspace in $SHARED_VERSION_WORKSPACES; do
            dry_run_pack "$workspace" "$SHARED_VERSION"
          done

      - name: Verify published packages
        if: env.DRY_RUN != 'true'
        shell: bash
        env:
          OPEN_ICON_VERSION: ${{ steps.open_icon_version.outputs.next }}
          SHARED_VERSION: ${{ steps.version.outputs.next }}
        run: |
          set -euo pipefail

          verify_package() {
            local workspace="$1"
            local version="$2"
            local package_spec="${workspace}@${version}"

            for attempt in {1..12}; do
              if npm view "$package_spec" version > /dev/null 2>&1; then
                echo "Verified $package_spec"
                return 0
              fi

              if [ "$attempt" -eq 12 ]; then
                echo "Failed to verify $package_spec on npm after publishing."
                return 1
              fi

              echo "Waiting for $package_spec to appear on npm (attempt $attempt/12)..."
              sleep 10
            done
          }

          verify_package open-icon "$OPEN_ICON_VERSION"

          for workspace in $SHARED_VERSION_WORKSPACES; do
            verify_package "$workspace" "$SHARED_VERSION"
          done

      - name: Commit version updates
        if: env.DRY_RUN != 'true'
        run: |
          git add package-lock.json packages/open-icon/package.json packages/vue-open-icon/package.json packages/react-open-icon/package.json packages/wc-open-icon/package.json packages/ng-open-icon/package.json packages/open-icon-transform/package.json packages/open-icon-svg/package.json packages/vite-plugin-open-icon/package.json apps/open-icon-org/release-notes
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "chore(Release): publish v${{ steps.version.outputs.next }} [skip ci]"
          git push origin HEAD:master
